version: '3.8'

services:
  web:
    build: .
    container_name: traveloop_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=traveloop
      - DB_PASS=secret
      - DB_NAME=traveloop

  db:
    image: mysql:8.0
    container_name: traveloop_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=traveloop
      - MYSQL_USER=traveloop
      - MYSQL_PASSWORD=secret
    volumes:
      - db_data:/var/lib/mysql
      - ./config/setup.sql:/docker-entrypoint-initdb.d/setup.sql

volumes:
  db_data:

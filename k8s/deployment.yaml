apiVersion: apps/v1
kind: Deployment
metadata:
  name: traveloop
  labels:
    app: traveloop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traveloop
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: traveloop
    spec:
      containers:
        - name: traveloop
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/traveloop:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: traveloop-config
            - secretRef:
                name: traveloop-secrets
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 512m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
